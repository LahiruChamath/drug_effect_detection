name: safepose_app
description: SafePose - Drug Effect Detection App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.2
  shared_preferences: ^2.2.2
  camera: ^0.10.5+9
  permission_handler: ^11.0.1
  google_fonts: ^6.1.0
  path_provider: ^2.1.5
  google_mlkit_pose_detection: ^0.12.0
  web: ^1.0.0
  share_plus: ^12.0.1
  google_sign_in: 6.1.5
  csv: ^8.0.0
  pdf: ^3.12.0
  printing: ^5.14.3

dependency_overrides:
  google_sign_in_ios: 5.7.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
